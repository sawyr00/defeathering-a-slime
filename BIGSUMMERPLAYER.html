<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DTGSLIME - Big Summer Player</title>

  <style>
    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #000;
      color: #fff;
      font-family: "Courier New", Courier, monospace;
    }

    body {
      overflow-x: hidden;
    }

    .home-link {
      position: fixed;
      top: 18px;
      left: 18px;
      z-index: 10;
      color: lavender;
      text-decoration: none;
      font-size: 14px;
      font-weight: bold;
      letter-spacing: 0;
    }

    .sequence-page {
      min-height: 100svh;
      box-sizing: border-box;
      padding: 72px 24px 48px;
    }

    .sequence-stack {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 28px;
    }

    .sequence-row {
      display: flex;
      justify-content: flex-start;
      align-items: flex-start;
      gap: 24px;
      flex-wrap: wrap;
    }

    .skin-sequence {
      width: min(360px, calc(100vw - 48px));
      height: auto;
      display: block;
    }

    video.skin-sequence {
      object-fit: contain;
    }

    @media (max-width: 700px) {
      .sequence-page {
        padding: 64px 16px 36px;
      }

      .sequence-row {
        gap: 18px;
      }

      .skin-sequence {
        width: min(320px, calc(100vw - 32px));
      }
    }
  </style>
</head>

<body>
  <a class="home-link" href="index.html">return to home</a>

  <main class="sequence-page">
    <section class="sequence-stack" aria-label="Big Summer Player sequences">

      <div class="sequence-row">
        <img
          class="skin-sequence"
          src="assets/images/rotations/rotate_counterclockwise_90_alpha_60fps_hold3s.apng.png"
          alt="Front to left rotation"
        >

        <img
          class="skin-sequence"
          src="assets/images/rotations/rotate_counterclockwise_90_plus_90_plus_90_plus_90_alpha_60fps_hold3s.apng.png"
          alt="Full counterclockwise rotation"
        >

        <img
          class="skin-sequence"
          src="assets/images/rotations/rotate_top_rightside_alpha_60fps_hold3s.apng.png"
          alt="Top and right side rotation"
        >
      </div>

      <div class="sequence-row">
        <img
          class="skin-sequence"
          src="assets/images/trackslimes/trackslimes_expand_hold5s_retract_hold5s_no_np_alpha_20fps.apng.png"
          alt="BB Trackslimes sequence"
        >

        <img
          class="skin-sequence"
          src="assets/images/bbnetworkring/bbnetworkring_expand_spin5s_retract_hold5s_slimespread_no_np_alpha_20fps.apng.png"
          alt="BB Network Ring sequence"
        >
      </div>

      <div class="sequence-row">
        <img
          class="skin-sequence"
          src="assets/images/visualizer 1/play_first_hatch_slimebeach_no_np_alpha_10s_10fps.apng.png"
          alt="Visualizer 1 sequence"
        >

        <video
          class="skin-sequence"
          src="assets/images/pbj_sequence/pbjvisualizer_circle_overlay_cleanbody_alpha_30fps.webm"
          autoplay
          loop
          muted
          playsinline
        ></video>

        <img
          class="skin-sequence"
          src="assets/images/visualizer 4 cd spin/cdspin_visualizer4_stable_loop_with_window_overlays_no_np_alpha_60fps.apng.png"
          alt="Disc spin visualizer sequence"
        >
      </div>

    </section>
  </main>
</body>
</html>
