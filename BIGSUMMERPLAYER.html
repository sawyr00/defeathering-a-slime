<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>DTGSLIME — Skin Player</title>
  <link rel="stylesheet" href="css/styles.css">

  <style>
    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #000;
      color: #fff;
      font-family: "Courier New", Courier, monospace;
    }

    body {
      overflow-x: hidden;
    }

    .sequence-page {
      min-height: 100svh;
      box-sizing: border-box;
      padding: 34px 22px 34px;
    }

    .sequence-stack {
      --slot: min(360px, 30vw);
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 34px;
    }

    .sequence-row {
      display: grid;
      grid-template-columns: repeat(3, var(--slot));
      column-gap: 42px;
      align-items: center;
    }

    .sequence-item {
      width: var(--slot);
      height: var(--slot);
      display: grid;
      place-items: center;
      overflow: visible;
    }

    .skin-sequence {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .player-sequence {
      width: 100%;
      height: 100%;
      object-fit: contain;
      transform: scale(1.18);
      transform-origin: center;
    }

    .pbj-sequence {
      width: 100%;
      height: 100%;
      object-fit: contain;
      transform: translate(8px, -6px) scale(1.46);
      transform-origin: center;
    }

    @media (max-width: 900px) {
      .sequence-stack {
        --slot: min(320px, calc(100vw - 32px));
        gap: 28px;
      }

      .sequence-row {
        grid-template-columns: 1fr;
        row-gap: 28px;
      }

      .sequence-item {
        width: var(--slot);
        height: var(--slot);
      }

      .player-sequence,
      .pbj-sequence {
        transform: none;
      }
    }
  </style>
</head>

<body>
  <main class="sequence-page">
    <section class="sequence-stack" aria-label="Big Summer Player sequences">

      <div class="sequence-row">
        <div class="sequence-item">
          <img
            class="skin-sequence"
            src="assets/images/rotations/rotate_counterclockwise_90_alpha_60fps_hold3s.apng.png"
            alt="Front to left rotation"
          >
        </div>

        <div class="sequence-item">
          <img
            class="skin-sequence"
            src="assets/images/rotations/rotate_counterclockwise_90_plus_90_plus_90_plus_90_alpha_60fps_hold3s.apng.png"
            alt="Full counterclockwise rotation"
          >
        </div>

        <div class="sequence-item">
          <img
            class="skin-sequence"
            src="assets/images/rotations/rotate_top_rightside_alpha_60fps_hold3s.apng.png"
            alt="Top and right side rotation"
          >
        </div>
      </div>

      <div class="sequence-row">
        <div class="sequence-item">
          <img
            class="skin-sequence player-sequence"
            src="assets/images/visualizer 1/play_first_hatch_slimebeach_no_np_alpha_10s_10fps.apng.png"
            alt="Visualizer 1 sequence"
          >
        </div>

        <div class="sequence-item">
          <video
            class="skin-sequence pbj-sequence"
            src="assets/images/pbj_sequence/pbjvisualizer_circle_overlay_cleanbody_alpha_30fps.webm"
            autoplay
            loop
            muted
            playsinline
          ></video>
        </div>

        <div class="sequence-item">
          <img
            class="skin-sequence player-sequence"
            src="assets/images/visualizer 4 cd spin/cdspin_visualizer4_stable_loop_with_window_overlays_no_np_alpha_60fps.apng.png"
            alt="Disc spin visualizer sequence"
          >
        </div>
      </div>

      <div class="sequence-row">
        <div class="sequence-item">
          <img
            class="skin-sequence player-sequence"
            src="assets/images/trackslimes/trackslimes_expand_hold5s_retract_hold5s_no_np_alpha_20fps.apng.png"
            alt="BB Trackslimes sequence"
          >
        </div>

        <div class="sequence-item">
          <img
            class="skin-sequence player-sequence"
            src="assets/images/bbnetworkring/bbnetworkring_expand_spin5s_retract_hold5s_slimespread_no_np_alpha_20fps.apng.png"
            alt="BB Network Ring sequence"
          >
        </div>

        <div class="sequence-item"></div>
      </div>

    </section>
  </main>

  <script>
    (function(){
      const PASS = 'BIGSLIME';
      const entry = prompt('Enter password to access this page:');
      if (entry !== PASS) {
        document.body.innerHTML =
          '<h2 style="text-align:center; margin-top:40vh;">Access denied.</h2>';
      }
    })();
  </script>
</body>
</html>
